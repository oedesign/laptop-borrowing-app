<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaptopTrack — Loading</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="page-loader">
  <div class="loader-brand">Laptop<span>Track</span></div>
  <div class="spinner dark"></div>
</div>

<script type="module">
  // Smart entry point: redirect to dashboard if logged in, else login page
  import { auth }           from "./js/firebaseConfig.js";
  import { getUserProfile } from "./js/auth.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "/login.html";
      return;
    }
    const profile = await getUserProfile(user.uid);
    window.location.href = profile?.role === "admin" ? "/admin.html" : "/dashboard.html";
  });
</script>
</body>
</html>
